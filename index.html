<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18인제 실시간 마피아 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a202c; color: #e2e8f0; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #4a5568; border-radius: 4px; }
        
        .player-item.dead { opacity: 0.4; text-decoration: line-through; filter: grayscale(100%); }
        .player-item.selectable { cursor: pointer; transition: all 0.2s; }
        .player-item.selectable:hover { background-color: rgba(66, 153, 225, 0.2); border-color: #4299e1; }
        .player-item.selected { background-color: rgba(66, 153, 225, 0.5); border-color: #3182ce; }
        
        /* Background Transitions for Day/Night */
        #game-board-bg { transition: background-color 1s ease, color 1s ease; }
        .bg-day { background-color: #2b6cb0; } /* Blue 600 */
        .bg-night { background-color: #1a202c; } /* Gray 900 */
        .bg-sunset { background-color: #c05621; } /* Orange 700 */
        
        /* Toast Notification */
        #toast-container { transition: opacity 0.3s; pointer-events: none; }
        
        /* No select for hold-to-reveal */
        .no-select { user-select: none; -webkit-user-select: none; -moz-user-select: none; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">

    <!-- Toast Notification -->
    <div id="toast-container" class="absolute top-4 left-1/2 transform -translate-x-1/2 z-[100] opacity-0 bg-red-600 text-white px-6 py-3 rounded-xl shadow-lg font-bold">
        알림 메시지
    </div>

    <!-- Auth / Login Screen -->
    <div id="auth-screen" class="absolute inset-0 z-50 flex items-center justify-center bg-gray-900">
        <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-4xl font-bold mb-2 text-blue-400">MAFIA<span class="text-gray-100"> WEB</span></h1>
            <p class="text-gray-400 mb-8">방 번호를 입력하여 입장하세요</p>
            
            <div id="loading-auth" class="text-blue-300 animate-pulse">
                <i class="fas fa-spinner fa-spin mr-2"></i>서버 연결 중...
            </div>

            <div id="name-form" class="hidden flex flex-col gap-4">
                <input type="text" id="room-input" placeholder="방 번호 (예: 1004)" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-blue-500 transition-colors text-center text-lg font-mono">
                <input type="text" id="nickname-input" placeholder="사용할 닉네임" class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-blue-500 transition-colors text-center text-lg">
                <button id="join-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-colors text-lg shadow-lg mt-2">게임 입장</button>
            </div>
        </div>
    </div>

    <!-- Main Game Interface -->
    <div id="main-screen" class="hidden flex-1 flex flex-col md:flex-row h-full">
        
        <!-- Left Panel: Game Info & Players -->
        <div class="w-full md:w-1/4 h-1/3 md:h-full border-b md:border-r border-gray-700 flex flex-col glass-panel z-20">
            <div class="p-4 border-b border-gray-700 bg-gray-800/50">
                <h2 class="text-xl font-bold text-white flex justify-between items-center mb-3">
                    <span><i class="fas fa-hashtag text-blue-400 mr-2"></i><span id="room-display">ROOM</span></span>
                    <span id="player-count" class="text-sm bg-gray-700 px-2 py-1 rounded font-mono">0/18</span>
                </h2>
                
                <!-- Touch to Reveal Role -->
                <div id="role-container" class="hidden relative border border-gray-600 rounded-lg bg-gray-800 overflow-hidden no-select">
                    <div id="role-cover" class="absolute inset-0 bg-gray-700 flex items-center justify-center cursor-pointer text-gray-300 font-bold hover:bg-gray-600 transition-colors z-10">
                        <i class="fas fa-eye mr-2"></i> 꾹 눌러서 직업 확인
                    </div>
                    <div class="p-3 text-center">
                        <span class="text-sm text-gray-400 block mb-1">나의 직업</span>
                        <span id="my-role-text" class="text-xl font-bold text-yellow-400">시민</span>
                    </div>
                </div>
            </div>
            <div id="player-list" class="flex-1 overflow-y-auto p-4 space-y-2">
                <!-- Players will be rendered here -->
            </div>
        </div>

        <!-- Center Panel: Game Board / Action Area -->
        <div id="game-board-bg" class="w-full md:w-2/4 h-1/3 md:h-full flex flex-col relative bg-night border-b md:border-b-0 md:border-r border-gray-700 overflow-hidden">
            
            <!-- Dynamic Background Icon -->
            <div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none z-0">
                <i id="bg-visual-icon" class="fas fa-users text-[15rem]"></i>
            </div>

            <!-- Phase Header -->
            <div class="h-20 bg-gray-900/80 backdrop-blur-sm flex items-center justify-between px-6 border-b border-gray-700 shadow-md z-10 relative">
                <div>
                    <div id="phase-title" class="text-2xl font-bold text-white">대기실</div>
                    <div id="phase-desc" class="text-gray-300 text-sm">참가자를 기다리고 있습니다.</div>
                </div>
                <div class="text-right">
                    <div class="text-sm text-gray-400">남은 시간</div>
                    <div id="timer-display" class="text-3xl font-mono text-yellow-400 font-bold">--:--</div>
                </div>
            </div>

            <!-- Action Area -->
            <div class="flex-1 flex items-center justify-center p-6 overflow-y-auto relative z-10">
                
                <!-- Lobby Panel -->
                <div id="lobby-panel" class="w-full max-w-lg glass-panel p-6 rounded-xl hidden bg-gray-900/90 shadow-2xl">
                    <h3 class="text-2xl font-bold mb-4 text-center text-blue-300">대기실</h3>
                    
                    <!-- Host Settings -->
                    <div id="host-settings-area" class="space-y-3 mb-6 hidden">
                        <div class="text-sm text-gray-400 mb-2 border-b border-gray-700 pb-2 text-center">직업 설정 (방장)</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="flex justify-between items-center bg-gray-800 p-2 rounded">
                                <label><i class="fas fa-user-secret text-red-400 w-6"></i> 마피아</label>
                                <input type="number" id="setting-mafia" value="2" min="1" max="5" class="w-16 bg-gray-700 text-center rounded text-white">
                            </div>
                            <div class="flex justify-between items-center bg-gray-800 p-2 rounded">
                                <label><i class="fas fa-user-nurse text-green-400 w-6"></i> 의사</label>
                                <input type="number" id="setting-doctor" value="1" min="0" max="3" class="w-16 bg-gray-700 text-center rounded text-white">
                            </div>
                            <div class="flex justify-between items-center bg-gray-800 p-2 rounded">
                                <label><i class="fas fa-shield-alt text-blue-400 w-6"></i> 경찰</label>
                                <input type="number" id="setting-police" value="1" min="0" max="3" class="w-16 bg-gray-700 text-center rounded text-white">
                            </div>
                            <div class="flex justify-between items-center bg-gray-800 p-2 rounded">
                                <label><i class="fas fa-taxi text-yellow-400 w-6"></i> 택시</label>
                                <input type="number" id="setting-taxi" value="1" min="0" max="2" class="w-16 bg-gray-700 text-center rounded text-white">
                            </div>
                            <div class="flex justify-between items-center bg-gray-800 p-2 rounded col-span-2">
                                <label><i class="fas fa-medal text-purple-400 w-6"></i> 군인</label>
                                <input type="number" id="setting-soldier" value="1" min="0" max="3" class="w-16 bg-gray-700 text-center rounded text-white">
                            </div>
                        </div>
                        <div id="role-calc-info" class="text-center text-sm font-bold mt-2"></div>
                    </div>

                    <!-- Non-Host Area -->
                    <div id="player-ready-area" class="text-center mb-4 hidden">
                        <p class="text-gray-300 mb-4">방장의 게임 시작을 기다리고 있습니다.<br>준비 버튼을 눌러주세요.</p>
                    </div>

                    <!-- Buttons -->
                    <button id="ready-btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition text-xl shadow-lg hidden">준비 완료</button>
                    <button id="start-game-btn" class="w-full py-4 bg-green-600 hover:bg-green-500 rounded-xl font-bold transition text-xl shadow-lg hidden disabled:opacity-50 disabled:cursor-not-allowed">게임 시작</button>
                </div>

                <!-- Voting / Action Selection Panel -->
                <div id="action-panel" class="w-full max-w-lg glass-panel p-6 rounded-xl hidden flex flex-col h-full max-h-[90%] bg-gray-900/90">
                    <h3 id="action-title" class="text-2xl font-bold mb-2 text-center text-red-400">행동 선택</h3>
                    <p id="action-desc" class="text-sm text-gray-300 text-center mb-4">대상을 선택하세요.</p>
                    
                    <div id="action-target-list" class="flex-1 overflow-y-auto space-y-2 mb-4 pr-2">
                        <!-- Selectable players injected here -->
                    </div>

                    <div class="flex gap-2">
                        <button id="action-skip-btn" class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition text-white shadow-md">넘기기</button>
                        <button id="action-submit-btn" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition text-white shadow-md disabled:opacity-50" disabled>선택 완료</button>
                    </div>
                </div>

                <!-- Result Message Panel -->
                <div id="result-panel" class="w-full max-w-lg glass-panel p-8 rounded-xl hidden text-center bg-gray-900/90 shadow-2xl">
                    <i id="result-icon" class="fas fa-info-circle text-7xl mb-4 text-white drop-shadow-lg"></i>
                    <h2 id="result-title" class="text-3xl font-bold text-white mb-3">알림</h2>
                    <p id="result-desc" class="text-gray-300 text-lg leading-relaxed">결과를 기다리는 중입니다.</p>
                    
                    <div id="private-result-box" class="mt-6 p-4 bg-gray-800 rounded border border-gray-600 hidden text-left">
                        <div class="text-xs text-yellow-400 font-bold mb-1"><i class="fas fa-lock"></i> 나만 보이는 정보</div>
                        <div id="private-result-text" class="text-base text-white font-semibold"></div>
                    </div>

                    <!-- Host Controls -->
                    <div class="mt-8 flex justify-center gap-2">
                        <button id="host-skip-phase-btn" class="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded text-sm text-white font-bold hidden"><i class="fas fa-forward mr-2"></i>페이즈 스킵</button>
                        <button id="host-reset-btn" class="px-6 py-3 bg-red-600 hover:bg-red-500 rounded text-white font-bold hidden shadow-lg"><i class="fas fa-undo mr-2"></i>대기실로 복귀</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Right Panel: Chat -->
        <div class="w-full md:w-1/4 h-1/3 md:h-full flex flex-col glass-panel relative z-20">
            <div class="p-4 border-b border-gray-700 bg-gray-800/50 flex justify-between items-center">
                <h2 class="font-bold text-white"><i class="fas fa-comments text-blue-400 mr-2"></i>채팅</h2>
            </div>
            
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-3 chat-container bg-gray-900/50">
                <!-- Chat messages -->
            </div>

            <!-- Chat Overlay when disabled -->
            <div id="chat-overlay" class="absolute inset-x-0 bottom-[60px] top-[60px] bg-gray-900/80 z-20 flex items-center justify-center backdrop-blur-sm hidden">
                <div class="text-center">
                    <i class="fas fa-lock text-4xl text-gray-500 mb-2"></i>
                    <p id="chat-disabled-msg" class="text-gray-300 font-bold">채팅 금지</p>
                </div>
            </div>

            <div class="p-4 border-t border-gray-700 bg-gray-800 z-10">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="chat-input" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500" placeholder="메시지 입력..." autocomplete="off">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-white font-bold"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mafia-web-18';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDi7Foz2uy6ehTq6DVtqXYHx38oADjDxmc",
            authDomain: "quiz-a62b6.firebaseapp.com",
            projectId: "quiz-a62b6",
            storageBucket: "quiz-a62b6.firebasestorage.app",
            messagingSenderId: "820572663251",
            appId: "1:820572663251:web:93a10a49654e4fc34bd326"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Dynamic References (Set after joining room)
        let ROOM_DOC, PLAYERS_COL, CHAT_COL, ACTIONS_COL;

        // State
        let myUid = null;
        let myName = "";
        let roomCode = "";
        let isHost = false;
        let myRole = "시민";
        let amIDead = false;
        let isReady = false;
        
        let gameState = { phase: 'lobby', phaseEndsAt: 0, logs: "", hostUid: "" };
        let playersList = [];
        let hostLoopInterval = null;
        let timerInterval = null;
        let hasJoined = false;

        // Spam prevention
        let chatTimestamps = [];
        let isSpamLocked = false;

        // UI Binding
        const elLobbyPanel = document.getElementById('lobby-panel');
        const elActionPanel = document.getElementById('action-panel');
        const elResultPanel = document.getElementById('result-panel');
        const elChatMessages = document.getElementById('chat-messages');
        const elChatInput = document.getElementById('chat-input');
        const elActionTargetList = document.getElementById('action-target-list');
        const elActionSubmitBtn = document.getElementById('action-submit-btn');
        let selectedTarget = null;

        // Toast Helper
        function showToast(msg) {
            const toast = document.getElementById('toast-container');
            toast.textContent = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }

        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { await signInWithCustomToken(auth, __initial_auth_token); } 
                    catch (e) { await signInAnonymously(auth); }
                } else { await signInAnonymously(auth); }
                
                myUid = auth.currentUser.uid;
                document.getElementById('loading-auth').classList.add('hidden');
                document.getElementById('name-form').classList.remove('hidden');
            } catch (error) {
                document.getElementById('loading-auth').innerHTML = `<span class="text-red-500">인증 실패</span>`;
            }
        }

        document.getElementById('join-btn').addEventListener('click', async () => {
            const rCode = document.getElementById('room-input').value.trim();
            const nName = document.getElementById('nickname-input').value.trim();
            if (!rCode || !nName) {
                showToast("방 번호와 닉네임을 모두 입력해주세요.");
                return;
            }

            roomCode = rCode;
            myName = nName;
            document.getElementById('room-display').textContent = roomCode;
            
            // Set Dynamic Paths based on Room Code
            ROOM_DOC = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
            PLAYERS_COL = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomCode}_players`);
            CHAT_COL = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomCode}_chat`);
            ACTIONS_COL = collection(db, 'artifacts', appId, 'public', 'data', `room_${roomCode}_actions`);

            // Join Player Collection
            await setDoc(doc(PLAYERS_COL, myUid), { 
                uid: myUid, name: myName, role: "시민", isAlive: true, isReady: false, joinedAt: Date.now() 
            });

            // Check if Room exists, otherwise create as Host
            const roomSnap = await getDoc(ROOM_DOC);
            if (!roomSnap.exists()) {
                await setDoc(ROOM_DOC, { phase: 'lobby', phaseEndsAt: 0, hostUid: myUid, logs: "방이 생성되었습니다." });
            }

            hasJoined = true;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');

            setupListeners();
            startClientTimer();
        });

        function setupListeners() {
            // Room State Listener
            onSnapshot(ROOM_DOC, (docSnap) => {
                if (!docSnap.exists()) return;
                gameState = docSnap.data();
                isHost = (gameState.hostUid === myUid);
                
                if (isHost && !hostLoopInterval) startHostLoop();
                if (!isHost && hostLoopInterval) { clearInterval(hostLoopInterval); hostLoopInterval = null; }

                // Host UI Toggles
                document.getElementById('host-settings-area').classList.toggle('hidden', !isHost);
                document.getElementById('start-game-btn').classList.toggle('hidden', !isHost);
                document.getElementById('player-ready-area').classList.toggle('hidden', isHost);
                document.getElementById('ready-btn').classList.toggle('hidden', isHost);
                document.getElementById('host-skip-phase-btn').classList.toggle('hidden', !isHost);
                
                ['mafia','doctor','police','taxi','soldier'].forEach(id => {
                    document.getElementById(`setting-${id}`).disabled = !isHost;
                });

                validateHostSettings(); // Check if start button should be enabled
                updatePhaseUI();
            });

            // Players Listener
            onSnapshot(PLAYERS_COL, (snapshot) => {
                playersList = [];
                snapshot.forEach(doc => playersList.push(doc.data()));
                playersList.sort((a, b) => a.name.localeCompare(b.name));
                
                if (hasJoined) {
                    const me = playersList.find(p => p.uid === myUid);
                    if (!me) {
                        alert("방장에 의해 추방되었거나 데이터가 삭제되었습니다.");
                        window.location.reload();
                        return;
                    }
                    myRole = me.role;
                    amIDead = !me.isAlive;
                    isReady = me.isReady;
                    
                    const roleContainer = document.getElementById('role-container');
                    const roleText = document.getElementById('my-role-text');
                    
                    if (gameState.phase !== 'lobby') {
                        roleContainer.classList.remove('hidden');
                        roleText.textContent = amIDead ? '사망' : myRole;
                        if (amIDead) roleText.className = "text-xl font-bold text-red-500";
                        else roleText.className = "text-xl font-bold text-yellow-400";
                    } else {
                        roleContainer.classList.add('hidden');
                    }
                }

                document.getElementById('player-count').textContent = `${playersList.length}명`;
                renderPlayerList();
                if(isHost) validateHostSettings();
                updatePhaseUI();
            });

            // Chat Listener
            onSnapshot(CHAT_COL, (snapshot) => {
                let msgs = [];
                snapshot.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
                msgs.sort((a, b) => a.timestamp - b.timestamp);
                
                if (msgs.length > 100) msgs = msgs.slice(-100);
                
                elChatMessages.innerHTML = '';
                msgs.forEach(msg => {
                    const isSystem = msg.uid === 'SYSTEM';
                    const isMe = msg.uid === myUid;
                    const div = document.createElement('div');
                    
                    if (isSystem) {
                        div.className = 'text-center text-sm text-yellow-500 my-2 font-bold';
                        div.textContent = `[알림] ${msg.text}`;
                    } else {
                        div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                        div.innerHTML = `<span class="text-xs text-gray-400 mb-1">${msg.name}</span>
                                         <div class="px-3 py-2 rounded-lg max-w-[85%] break-words ${isMe ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-200'}">${msg.text}</div>`;
                    }
                    elChatMessages.appendChild(div);
                });
                elChatMessages.scrollTop = elChatMessages.scrollHeight;
            });
        }

        function renderPlayerList() {
            const listEl = document.getElementById('player-list');
            listEl.innerHTML = '';
            
            playersList.forEach(p => {
                const isMe = p.uid === myUid;
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg border border-gray-700 flex justify-between items-center bg-gray-800 ${!p.isAlive ? 'dead' : ''}`;
                
                let nameHtml = `<span class="font-bold ${isMe ? 'text-blue-400' : 'text-gray-200'}">${p.name} ${isMe ? '(나)' : ''}</span>`;
                
                let rightHtml = '';
                if (!p.isAlive && gameState.phase !== 'lobby') {
                    rightHtml = `<i class="fas fa-skull text-red-500" title="사망"></i>`;
                } else if (gameState.phase === 'lobby') {
                    if (p.uid === gameState.hostUid) {
                        rightHtml = `<i class="fas fa-crown text-yellow-400" title="방장"></i>`;
                    } else {
                        rightHtml = p.isReady 
                            ? `<i class="fas fa-check-circle text-green-500" title="준비 완료"></i>` 
                            : `<i class="fas fa-spinner fa-spin text-gray-500" title="대기 중"></i>`;
                        
                        if (isHost && !isMe) {
                            rightHtml += ` <button class="ml-3 text-red-400 hover:text-red-500 kick-btn" data-uid="${p.uid}"><i class="fas fa-ban"></i></button>`;
                        }
                    }
                } else {
                    rightHtml = `<i class="fas fa-user text-gray-500"></i>`;
                }

                div.innerHTML = `<div>${nameHtml}</div><div>${rightHtml}</div>`;
                listEl.appendChild(div);
            });

            // Bind Kick Events
            document.querySelectorAll('.kick-btn').forEach(btn => {
                btn.onclick = async (e) => {
                    const targetUid = e.currentTarget.getAttribute('data-uid');
                    await deleteDoc(doc(PLAYERS_COL, targetUid));
                    sysChat("방장이 플레이어를 추방했습니다.");
                };
            });
        }

        // Role Reveal Touch Events
        const roleCover = document.getElementById('role-cover');
        const showRole = () => roleCover.classList.add('hidden');
        const hideRole = () => roleCover.classList.remove('hidden');
        roleCover.addEventListener('mousedown', showRole);
        roleCover.addEventListener('touchstart', (e) => { e.preventDefault(); showRole(); });
        window.addEventListener('mouseup', hideRole);
        window.addEventListener('touchend', hideRole);

        function updatePhaseUI() {
            const phaseMap = {
                'lobby': '대기실', 'day_discuss': '낮 (토론)', 'day_vote': '투표 시간',
                'day_result': '투표 결과', 'day_soldier': '군인의 외침', 'night_action': '밤 (행동)', 
                'night_result': '밤 결과', 'game_over': '게임 종료'
            };
            
            document.getElementById('phase-title').textContent = phaseMap[gameState.phase] || gameState.phase;
            document.getElementById('phase-desc').textContent = gameState.logs || '';

            elLobbyPanel.classList.add('hidden');
            elActionPanel.classList.add('hidden');
            elResultPanel.classList.add('hidden');
            document.getElementById('private-result-box').classList.add('hidden');
            document.getElementById('host-reset-btn').classList.add('hidden');

            // --- Theme & Background Update ---
            const bgEl = document.getElementById('game-board-bg');
            const iconEl = document.getElementById('bg-visual-icon');
            bgEl.className = "w-full md:w-2/4 h-1/3 md:h-full flex flex-col relative border-b md:border-b-0 md:border-r border-gray-700 overflow-hidden transition-colors duration-1000";
            
            if (['lobby', 'game_over'].includes(gameState.phase)) {
                bgEl.classList.add('bg-gray-900');
                iconEl.className = "fas fa-users text-[15rem] text-gray-500";
            } else if (['day_discuss', 'day_result', 'day_soldier'].includes(gameState.phase)) {
                bgEl.classList.add('bg-day');
                iconEl.className = "fas fa-sun text-[15rem] text-yellow-300 opacity-20";
            } else if (gameState.phase === 'day_vote') {
                bgEl.classList.add('bg-sunset');
                iconEl.className = "fas fa-box text-[15rem] text-orange-300 opacity-20";
            } else { // night
                bgEl.classList.add('bg-night');
                iconEl.className = "fas fa-moon text-[15rem] text-blue-300 opacity-10";
            }

            // --- Chat Access Control ---
            let canChat = false;
            let dMsg = "";
            let iconClass = "fa-lock text-gray-500";
            let msgClass = "text-gray-300";

            if (isSpamLocked) {
                dMsg = "도배 감지! 채팅 잠금됨";
                iconClass = "fa-exclamation-triangle text-red-500 animate-pulse";
                msgClass = "text-red-400";
            } else if (amIDead) {
                dMsg = "사망자는 채팅 금지";
            } else if (['lobby', 'day_discuss', 'game_over'].includes(gameState.phase)) {
                canChat = true;
            } else {
                dMsg = "현재 페이즈 채팅 금지";
            }

            document.getElementById('chat-overlay').classList.toggle('hidden', canChat);
            document.getElementById('chat-disabled-msg').textContent = dMsg;
            document.getElementById('chat-disabled-msg').className = `font-bold ${msgClass}`;
            document.getElementById('chat-overlay').querySelector('i').className = `fas ${iconClass} text-4xl mb-2`;
            elChatInput.disabled = !canChat;

            // --- Panel Router ---
            if (gameState.phase === 'lobby') {
                elLobbyPanel.classList.remove('hidden');
                document.getElementById('ready-btn').textContent = isReady ? "준비 취소" : "준비 완료";
                document.getElementById('ready-btn').className = isReady 
                    ? "w-full py-4 bg-gray-600 hover:bg-gray-500 rounded-xl font-bold transition text-xl shadow-lg"
                    : "w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition text-xl shadow-lg";
            } else if (gameState.phase === 'day_vote' || gameState.phase === 'night_action' || gameState.phase === 'day_soldier') {
                setupActionPanel();
            } else {
                showResultPanel();
                if (gameState.phase === 'game_over' && isHost) document.getElementById('host-reset-btn').classList.remove('hidden');
                if (gameState.phase === 'night_result' && myRole === '경찰') renderPoliceResult();
            }
        }

        function setupActionPanel() {
            const t = document.getElementById('action-title');
            const d = document.getElementById('action-desc');
            let allowed = false;
            let filter = p => p.isAlive && p.uid !== myUid;

            if (gameState.phase === 'day_vote' && !amIDead) {
                t.textContent = "투표"; d.textContent = "처형할 대상을 고르세요.";
                allowed = true; filter = p => p.isAlive;
            } else if (gameState.phase === 'night_action' && !amIDead) {
                if (myRole === '마피아') {
                    t.textContent = "마피아 암살"; d.textContent = "제거할 대상을 선택하세요.";
                    allowed = true; filter = p => p.isAlive && p.role !== '마피아';
                } else if (myRole === '의사') {
                    t.textContent = "의사 치료"; d.textContent = "살릴 사람을 선택하세요 (자신 포함).";
                    allowed = true; filter = p => p.isAlive;
                } else if (myRole === '경찰') {
                    t.textContent = "경찰 조사"; d.textContent = "마피아 여부를 조사할 사람을 고르세요.";
                    allowed = true;
                } else if (myRole === '택시 기사') {
                    t.textContent = "택시 탑승"; d.textContent = "택시에 태워 보호할 1명을 고르세요.";
                    allowed = true; filter = p => p.isAlive;
                }
            } else if (gameState.phase === 'day_soldier' && amIDead && myRole === '군인') {
                t.textContent = "마지막 외침 (군인)"; d.textContent = "정체를 강제 공개할 대상을 선택하세요.";
                allowed = true;
            }

            if (!allowed) {
                showResultPanel(amIDead ? "사망했습니다." : "밤입니다. 눈을 감으세요.", "fa-bed", "text-blue-300");
                return;
            }

            elActionPanel.classList.remove('hidden');
            elActionTargetList.innerHTML = '';
            selectedTarget = null;
            elActionSubmitBtn.disabled = true;

            playersList.filter(filter).forEach(p => {
                const btn = document.createElement('div');
                btn.className = 'player-item selectable p-4 rounded-lg bg-gray-800 border border-gray-600 font-bold text-lg text-center';
                btn.textContent = p.name;
                btn.onclick = () => {
                    Array.from(elActionTargetList.children).forEach(c => c.classList.remove('selected'));
                    selectedTarget = p.uid;
                    btn.classList.add('selected');
                    elActionSubmitBtn.disabled = false;
                };
                elActionTargetList.appendChild(btn);
            });
        }

        document.getElementById('action-submit-btn').onclick = async () => {
            if (!selectedTarget) return;
            await setDoc(doc(ACTIONS_COL, myUid), { uid: myUid, phase: gameState.phase, role: myRole, target: selectedTarget });
            elActionPanel.classList.add('hidden');
            showResultPanel("행동 완료. 다른 플레이어를 기다립니다.", "fa-check-circle", "text-green-400");
        };

        document.getElementById('action-skip-btn').onclick = async () => {
            await setDoc(doc(ACTIONS_COL, myUid), { uid: myUid, phase: gameState.phase, role: myRole, target: "SKIP" });
            elActionPanel.classList.add('hidden');
            showResultPanel("행동을 넘겼습니다.", "fa-forward", "text-gray-400");
        };

        function showResultPanel(desc, iconClass = "fa-info-circle", colorClass = "text-white") {
            elResultPanel.classList.remove('hidden');
            document.getElementById('result-desc').innerHTML = (desc || gameState.logs).replace(/\n/g, '<br>');
            document.getElementById('result-icon').className = `fas ${iconClass} text-7xl mb-4 ${colorClass} drop-shadow-lg`;
        }

        document.getElementById('ready-btn').addEventListener('click', async () => {
            await updateDoc(doc(PLAYERS_COL, myUid), { isReady: !isReady });
        });

        // Listen to Input changes to validate in real-time
        ['mafia','doctor','police','taxi','soldier'].forEach(id => {
            document.getElementById(`setting-${id}`).addEventListener('input', validateHostSettings);
        });

        function validateHostSettings() {
            if(!isHost) return;
            const m = parseInt(document.getElementById('setting-mafia').value) || 0;
            const d = parseInt(document.getElementById('setting-doctor').value) || 0;
            const p = parseInt(document.getElementById('setting-police').value) || 0;
            const t = parseInt(document.getElementById('setting-taxi').value) || 0;
            const s = parseInt(document.getElementById('setting-soldier').value) || 0;
            
            const totalSpecial = m + d + p + t + s;
            const totalPlayers = playersList.length;
            const citizenCount = totalPlayers - totalSpecial;

            const infoEl = document.getElementById('role-calc-info');
            const startBtn = document.getElementById('start-game-btn');

            let readyCount = 0;
            let nonHostCount = 0;
            playersList.forEach(pl => {
                if (pl.uid !== myUid) { nonHostCount++; if (pl.isReady) readyCount++; }
            });

            const allReady = (readyCount === nonHostCount);

            if (totalSpecial > totalPlayers) {
                infoEl.innerHTML = `<span class="text-red-400">특수 직업 수(${totalSpecial})가 총 인원(${totalPlayers})보다 많습니다!</span>`;
                startBtn.disabled = true;
            } else if (!allReady && nonHostCount > 0) {
                infoEl.innerHTML = `<span class="text-yellow-400">시민: ${citizenCount}명 | 모든 플레이어 레디 대기 중 (${readyCount}/${nonHostCount})</span>`;
                startBtn.disabled = true;
            } else {
                infoEl.innerHTML = `<span class="text-green-400">시민: ${citizenCount}명 | 모두 준비 완료!</span>`;
                startBtn.disabled = false;
            }
        }

        document.getElementById('start-game-btn').addEventListener('click', async () => {
            if (!isHost || document.getElementById('start-game-btn').disabled) return;
            
            const m = parseInt(document.getElementById('setting-mafia').value);
            const d = parseInt(document.getElementById('setting-doctor').value);
            const p = parseInt(document.getElementById('setting-police').value);
            const t = parseInt(document.getElementById('setting-taxi').value);
            const s = parseInt(document.getElementById('setting-soldier').value);

            let pool = [];
            for(let i=0; i<m; i++) pool.push("마피아");
            for(let i=0; i<d; i++) pool.push("의사");
            for(let i=0; i<p; i++) pool.push("경찰");
            for(let i=0; i<t; i++) pool.push("택시 기사");
            for(let i=0; i<s; i++) pool.push("군인");
            while(pool.length < playersList.length) pool.push("시민");
            pool.sort(() => Math.random() - 0.5);

            for (let i = 0; i < playersList.length; i++) {
                await updateDoc(doc(PLAYERS_COL, playersList[i].uid), { role: pool[i], isAlive: true, isReady: false });
            }

            await sysChat("===== 게임이 시작되었습니다 =====");
            await changePhase('day_discuss', 180, "낮이 밝았습니다. 토론을 통해 마피아를 찾으세요.\n(시간: 3분)");
        });

        // Chat Deletion on End Game
        async function wipeChatData() {
            const snap = await getDocs(CHAT_COL);
            const deletePromises = [];
            snap.forEach(d => deletePromises.push(deleteDoc(d.ref)));
            await Promise.all(deletePromises);
        }

        document.getElementById('host-reset-btn').addEventListener('click', async () => {
            if(!isHost) return;
            await wipeChatData(); // Clean up chat before resetting
            for (let p of playersList) await updateDoc(doc(PLAYERS_COL, p.uid), { role: '시민', isAlive: true, isReady: false });
            await sysChat("방장이 게임을 초기화하여 대기실로 복귀했습니다.");
            await changePhase('lobby', 0, "대기실로 복귀했습니다.");
        });

        document.getElementById('host-skip-phase-btn').addEventListener('click', () => {
            if (isHost) executePhaseTransition();
        });

        function startHostLoop() {
            if (hostLoopInterval) clearInterval(hostLoopInterval);
            hostLoopInterval = setInterval(() => {
                if (gameState.phase === 'lobby' || gameState.phase === 'game_over') return;
                if (Date.now() >= gameState.phaseEndsAt) executePhaseTransition();
            }, 1000);
        }

        async function executePhaseTransition() {
            const p = gameState.phase;
            if (p === 'day_discuss') {
                await clearActions(); await changePhase('day_vote', 30, "투표 시간입니다. 30초 내에 마피아로 의심되는 사람을 투표하세요.");
            } else if (p === 'day_vote') {
                await calculateDayVote();
            } else if (p === 'day_soldier') {
                await calculateSoldier();
            } else if (p === 'day_result') {
                if (await checkWinCondition()) return;
                await clearActions(); await changePhase('night_action', 30, "밤이 되었습니다. 마피아와 특수 직업은 대상을 선택하세요.");
            } else if (p === 'night_action') {
                await calculateNightActions();
            } else if (p === 'night_result') {
                if (await checkWinCondition()) return;
                await changePhase('day_discuss', 180, "아침이 밝았습니다. 다시 토론을 시작하세요.");
            }
        }

        async function changePhase(newPhase, durationSec, logs) {
            await updateDoc(ROOM_DOC, { phase: newPhase, phaseEndsAt: Date.now() + (durationSec * 1000), logs: logs });
            await sysChat(`[시스템] ${logs.split('\n')[0]}`);
        }

        async function clearActions() {
            const snap = await getDocs(ACTIONS_COL);
            await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
        }

        async function calculateDayVote() {
            const snap = await getDocs(ACTIONS_COL);
            const votes = {};
            snap.forEach(doc => {
                const d = doc.data();
                if (d.phase === 'day_vote' && d.target !== 'SKIP') votes[d.target] = (votes[d.target] || 0) + 1;
            });

            let maxVotes = 0, toDie = null, isTie = false;
            for (const [uid, count] of Object.entries(votes)) {
                if (count > maxVotes) { maxVotes = count; toDie = uid; isTie = false; } 
                else if (count === maxVotes) isTie = true;
            }

            if (toDie && !isTie) {
                const targetPlayer = playersList.find(p => p.uid === toDie);
                await updateDoc(doc(PLAYERS_COL, toDie), { isAlive: false });
                
                if (targetPlayer.role === '군인') {
                    await changePhase('day_soldier', 15, `투표 결과: ${targetPlayer.name} 처형됨.\n군인인 그가 죽기 전 마지막 물귀신 대상을 고릅니다!`);
                } else {
                    await changePhase('day_result', 10, `투표 결과: [${targetPlayer.name}]님이 처형되었습니다.`);
                }
            } else {
                await changePhase('day_result', 10, "투표가 동률이거나 모두 무효 처리되어 아무도 처형되지 않았습니다.");
            }
        }

        async function calculateSoldier() {
            const snap = await getDocs(ACTIONS_COL);
            let sTarget = null;
            snap.forEach(doc => {
                const d = doc.data();
                if (d.phase === 'day_soldier' && d.role === '군인' && d.target !== 'SKIP') sTarget = d.target;
            });

            if (sTarget) {
                const p = playersList.find(x => x.uid === sTarget);
                await changePhase('day_result', 10, `[군인의 외침] 죽어가는 군인이 폭로합니다!\n"${p.name}의 정체는 [${p.role}] 이다!!"`);
            } else {
                await changePhase('day_result', 5, "군인이 침묵을 지키며 조용히 숨을 거두었습니다.");
            }
        }

        async function calculateNightActions() {
            const snap = await getDocs(ACTIONS_COL);
            let mafia = [], doctor = null, taxi = null;

            snap.forEach(doc => {
                const d = doc.data();
                if (d.phase !== 'night_action' || d.target === 'SKIP') return;
                if (d.role === '마피아') mafia.push(d.target);
                if (d.role === '의사') doctor = d.target;
                if (d.role === '택시 기사') taxi = d.target;
            });

            let mTarget = mafia[0]; 
            let deaths = [];
            let logs = "밤사이 아무 일도 일어나지 않았습니다.";

            if (mTarget) {
                const taxiPlayer = playersList.find(p => p.role === '택시 기사' && p.isAlive);
                const taxiUid = taxiPlayer ? taxiPlayer.uid : null;

                if (mTarget === taxiUid) {
                    deaths.push(taxiUid);
                    if (taxi && taxi !== taxiUid) deaths.push(taxi);
                    logs = `끔찍한 사고! 마피아가 택시를 폭파시켜 기사와 승객 등 총 ${deaths.length}명이 사망했습니다.`;
                } else if (mTarget === taxi) {
                    logs = "마피아가 습격했으나, 대상이 택시를 타고 도주하여 암살에 실패했습니다.";
                } else if (mTarget === doctor) {
                    logs = "밤사이 마피아의 공격이 있었으나, 의사의 헌신적인 치료로 살아남았습니다.";
                } else {
                    deaths.push(mTarget);
                    const dp = playersList.find(p => p.uid === mTarget);
                    logs = `밤사이 [${dp ? dp.name : '누군가'}]님이 마피아에게 암살당했습니다.`;
                }
            }

            for (let uid of deaths) await updateDoc(doc(PLAYERS_COL, uid), { isAlive: false });
            await changePhase('night_result', 10, logs);
        }

        async function renderPoliceResult() {
            const snap = await getDocs(ACTIONS_COL);
            let myTarget = null, taxiTarget = null;
            
            snap.forEach(doc => {
                const d = doc.data();
                if (d.phase === 'night_action' && d.target !== 'SKIP') {
                    if (d.uid === myUid) myTarget = d.target;
                    if (d.role === '택시 기사') taxiTarget = d.target;
                }
            });

            const box = document.getElementById('private-result-box');
            const txt = document.getElementById('private-result-text');
            box.classList.remove('hidden');

            if (!myTarget) { txt.textContent = "조사를 건너뛰었습니다."; return; }
            if (myTarget === taxiTarget) {
                txt.innerHTML = "<span class='text-yellow-400'>대상이 택시에 탑승하여 행방을 쫓을 수 없었습니다 (조사 실패).</span>"; return;
            }

            const targetP = playersList.find(p => p.uid === myTarget);
            const isMafia = targetP && targetP.role === '마피아';
            if (isMafia) txt.innerHTML = `<span class='text-red-400'>[${targetP.name}]님은 마피아가 맞습니다!</span>`;
            else txt.innerHTML = `<span class='text-green-400'>[${targetP.name}]님은 마피아가 아닙니다.</span>`;
        }

        async function checkWinCondition() {
            const snap = await getDocs(PLAYERS_COL);
            let mCount = 0, cCount = 0;
            snap.forEach(doc => {
                const p = doc.data();
                if (p.isAlive) { p.role === '마피아' ? mCount++ : cCount++; }
            });

            if (mCount === 0) {
                await wipeChatData(); // Delete chat on game over
                await changePhase('game_over', 0, "모든 마피아가 소탕되었습니다.\n🎉 시민팀의 승리! 🎉");
                return true;
            } else if (mCount >= cCount) {
                await wipeChatData(); // Delete chat on game over
                await changePhase('game_over', 0, "마피아가 시민의 수를 압도했습니다.\n💀 마피아팀의 승리! 💀");
                return true;
            }
            return false;
        }

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = elChatInput.value.trim();
            if (!text || amIDead || !['lobby', 'day_discuss', 'game_over'].includes(gameState.phase) || isSpamLocked) return;

            // Spam Detection (4 msgs in 3 seconds)
            const now = Date.now();
            chatTimestamps = chatTimestamps.filter(t => now - t < 3000); 
            chatTimestamps.push(now);

            if (chatTimestamps.length >= 4) {
                isSpamLocked = true;
                elChatInput.value = '';
                updatePhaseUI(); 
                
                setTimeout(() => {
                    isSpamLocked = false;
                    chatTimestamps = [];
                    updatePhaseUI(); 
                }, 5000);
                return;
            }

            elChatInput.value = '';
            await addDoc(CHAT_COL, { uid: myUid, name: myName, text: text, timestamp: Date.now() });
        });

        async function sysChat(text) { await addDoc(CHAT_COL, { uid: 'SYSTEM', name: 'System', text: text, timestamp: Date.now() }); }

        function startClientTimer() {
            timerInterval = setInterval(() => {
                if (['lobby', 'game_over'].includes(gameState.phase)) {
                    document.getElementById('timer-display').textContent = '--:--'; return;
                }
                let rem = Math.max(0, Math.floor((gameState.phaseEndsAt - Date.now()) / 1000));
                let m = Math.floor(rem / 60).toString().padStart(2, '0');
                let s = (rem % 60).toString().padStart(2, '0');
                
                const tEl = document.getElementById('timer-display');
                tEl.textContent = `${m}:${s}`;
                if (rem <= 10) tEl.classList.replace('text-yellow-400', 'text-red-500');
                else tEl.classList.replace('text-red-500', 'text-yellow-400');
            }, 200);
        }

        init();
    </script>
</body>
</html>
